<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Coach｜企業主計畫</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --yellow: #F5C518;
      --yellow-dark: #e6b800;
      --black: #111111;
      --black2: #1a1a1a;
      --gray1: #222222;
      --gray3: #888888;
      --white: #ffffff;
      --bg: #f7f7f5;
      --card-bg: #ffffff;
      --border: #e5e5e5;
      --radius: 10px;
      --radius-sm: 6px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans TC', 'Segoe UI', sans-serif; background: var(--bg); min-height: 100vh; display: flex; flex-direction: column; }

    .topbar { background: var(--black); padding: 14px 20px; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 100; }
    .topbar-logo { width: 28px; height: 28px; flex-shrink: 0; }
    .topbar-title { font-size: 15px; font-weight: 600; color: var(--white); }
    .topbar-badge { margin-left: auto; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; background: var(--yellow); color: var(--black); }

    .tab-bar { background: var(--black); display: flex; padding: 0 20px; border-bottom: 1px solid #2a2a2a; }
    .tab { padding: 11px 0; margin-right: 28px; font-size: 13px; color: var(--gray3); border-bottom: 2px solid transparent; cursor: default; user-select: none; }
    .tab.active { color: var(--yellow); border-bottom-color: var(--yellow); font-weight: 600; }

    .screen { display: none; flex: 1; flex-direction: column; }
    .screen.active { display: flex; }

    /* 設定頁 */
    .setup-content { max-width: 560px; width: 100%; margin: 0 auto; padding: 28px 20px 40px; }
    .screen-title { font-size: 20px; font-weight: 700; color: var(--black2); margin-bottom: 6px; }
    .screen-sub { font-size: 13px; color: var(--gray3); margin-bottom: 26px; line-height: 1.7; }
    .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
    .card-title { font-size: 12px; font-weight: 700; color: var(--gray3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 14px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-group { margin-bottom: 14px; }
    .form-group:last-child { margin-bottom: 0; }
    .form-label { font-size: 12px; font-weight: 600; color: #555; margin-bottom: 5px; display: block; }
    .form-input, .form-textarea { width: 100%; padding: 9px 11px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; color: var(--black2); background: #fafafa; font-family: inherit; transition: border-color 0.15s; }
    .form-input:focus, .form-textarea:focus { outline: none; border-color: var(--yellow); background: #fff; }
    .form-textarea { resize: vertical; min-height: 80px; }
    .form-hint { font-size: 11px; color: var(--gray3); margin-top: 4px; }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip { padding: 6px 13px; border: 1px solid var(--border); border-radius: 20px; font-size: 12px; color: #555; cursor: pointer; background: #fafafa; transition: all 0.15s; user-select: none; }
    .chip:hover { border-color: var(--yellow); color: var(--black2); }
    .chip.selected { background: var(--yellow); border-color: var(--yellow); color: var(--black); font-weight: 600; }
    .start-btn { width: 100%; padding: 14px; background: var(--yellow); color: var(--black); border: none; border-radius: var(--radius); font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 8px; font-family: inherit; transition: background 0.15s; }
    .start-btn:hover { background: var(--yellow-dark); }
    .start-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* 對話頁 - 雙欄佈局 */
    .session-layout { display: grid; grid-template-columns: 300px 1fr; flex: 1; min-height: 0; overflow: hidden; }

    /* 左欄：情境面板 */
    .left-panel { background: var(--black); padding: 28px 24px; display: flex; flex-direction: column; gap: 20px; border-right: 1px solid #2a2a2a; overflow-y: auto; }
    .left-profile { display: flex; align-items: center; gap: 14px; }
    .left-avatar-icon { width: 50px; height: 50px; border-radius: 50%; background: var(--gray1); border: 2px solid var(--yellow); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .left-name { font-size: 17px; font-weight: 700; color: var(--white); }
    .left-meta { font-size: 13px; color: var(--gray3); margin-top: 3px; }
    .left-divider { height: 1px; background: #2a2a2a; }
    .left-section-label { font-size: 10px; font-weight: 700; color: var(--yellow); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 7px; }
    .left-section-text { font-size: 13px; color: #aaaaaa; line-height: 1.7; }
    .left-spacer { flex: 1; }
    .reset-link { font-size: 13px; color: var(--gray3); cursor: pointer; background: none; border: none; font-family: inherit; text-decoration: underline; text-underline-offset: 3px; padding: 0; text-align: left; }
    .reset-link:hover { color: #aaa; }

    /* 右欄：對話區 */
    .right-panel { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 48px 32px; gap: 22px; background: var(--bg); overflow-y: auto; }
    .avatar-ring { width: 140px; height: 140px; border-radius: 50%; border: 3px solid var(--yellow); display: flex; align-items: center; justify-content: center; background: var(--gray1); font-size: 56px; position: relative; transition: border-color 0.3s; }
    .avatar-ring.speaking { border-color: #22c55e; box-shadow: 0 0 0 8px rgba(34,197,94,0.12); }
    .avatar-dot { position: absolute; bottom: 7px; right: 7px; width: 16px; height: 16px; border-radius: 50%; background: #555; border: 3px solid var(--bg); transition: background 0.3s; }
    .avatar-dot.connected { background: #22c55e; }
    .voice-status { font-size: 14px; color: var(--gray3); text-align: center; line-height: 1.8; }
    .voice-status.active { color: #22c55e; font-weight: 600; }
    .voice-status.error { color: #e24b4a; }
    .mic-btn { width: 76px; height: 76px; border-radius: 50%; background: var(--yellow); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
    .mic-btn:hover { background: var(--yellow-dark); transform: scale(1.05); }
    .mic-btn.muted { background: #333; }
    .mic-btn svg { width: 30px; height: 30px; fill: var(--black); }
    .mic-btn.muted svg { fill: var(--gray3); }
    .mic-label { font-size: 12px; color: var(--gray3); text-align: center; }
    .end-btn { padding: 10px 28px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--card-bg); font-size: 13px; color: #e24b4a; cursor: pointer; font-family: inherit; transition: all 0.15s; }
    .end-btn:hover { background: #fff0f0; border-color: #e24b4a; }

    @media (max-width: 640px) {
      .session-layout { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
      .left-panel { padding: 16px 20px; gap: 12px; border-right: none; border-bottom: 1px solid #2a2a2a; }
      .left-spacer { display: none; }
      .right-panel { padding: 28px 20px; }
      .avatar-ring { width: 100px; height: 100px; font-size: 40px; }
    }
    @media (max-width: 480px) {
      .form-row { grid-template-columns: 1fr; }
      .setup-content { padding: 20px 16px 40px; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <svg class="topbar-logo" viewBox="0 0 28 28" fill="none">
    <circle cx="14" cy="14" r="13" fill="#F5C518"/>
    <polygon points="11,7 21,14 11,21" fill="#111111"/>
  </svg>
  <span class="topbar-title">AI Coach</span>
  <span class="topbar-badge">企業主計畫</span>
</div>

<div class="tab-bar">
  <div class="tab active" id="tab1">情境設定</div>
  <div class="tab" id="tab2">對話練習</div>
</div>

<!-- 設定頁 -->
<div class="screen active" id="screen1">
  <div class="setup-content">
    <p class="screen-title">設定練習情境</p>
    <p class="screen-sub">填寫職員背景與溝通目標，AI 會根據這些資訊進入角色。描述越具體，練習越真實。</p>

    <div class="card">
      <p class="card-title">職員資料</p>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">姓名</label>
          <input class="form-input" type="text" placeholder="例：王小明" id="emp-name" />
        </div>
        <div class="form-group">
          <label class="form-label">年資</label>
          <input class="form-input" type="text" placeholder="例：3年" id="emp-years" />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">職位</label>
        <input class="form-input" type="text" placeholder="例：業務專員、資深工程師" id="emp-role" />
      </div>
      <div class="form-group" style="margin-bottom:0">
        <label class="form-label">個性與背景描述</label>
        <textarea class="form-textarea" placeholder="例：在公司五年的資深員工，最近業績持續下滑，對於主管的要求有些抗拒，但整體態度還算配合。" id="emp-bg"></textarea>
        <p class="form-hint">描述越具體，AI 扮演越真實</p>
      </div>
    </div>

    <div class="card">
      <p class="card-title">這次談話的目標（可複選）</p>
      <div class="chips">
        <div class="chip" onclick="toggleChip(this)">了解業績下滑原因</div>
        <div class="chip" onclick="toggleChip(this)">給予改善期限</div>
        <div class="chip" onclick="toggleChip(this)">傳達組織變革</div>
        <div class="chip" onclick="toggleChip(this)">討論薪資調整</div>
        <div class="chip" onclick="toggleChip(this)">處理離職意願</div>
        <div class="chip" onclick="toggleChip(this)">給予績效回饋</div>
        <div class="chip" onclick="toggleChip(this)">建立改善計畫</div>
        <div class="chip" onclick="toggleChip(this)">未履行承諾</div>
      </div>
    </div>

    <div class="card">
      <p class="card-title">補充說明（選填）</p>
      <div class="form-group" style="margin-bottom:0">
        <textarea class="form-textarea" placeholder="其他想特別練習的溝通重點？" id="emp-extra" style="min-height:60px"></textarea>
      </div>
    </div>

    <button class="start-btn" id="start-btn" onclick="startSession()">開始練習 →</button>
  </div>
</div>

<!-- 對話頁 -->
<div class="screen" id="screen2">
  <div class="session-layout">

    <!-- 左欄：情境面板 -->
    <div class="left-panel">
      <div class="left-profile">
        <div class="left-avatar-icon">👤</div>
        <div>
          <p class="left-name" id="display-name">—</p>
          <p class="left-meta" id="display-meta">—</p>
        </div>
      </div>

      <div class="left-divider"></div>

      <div>
        <p class="left-section-label">背景</p>
        <p class="left-section-text" id="display-bg">—</p>
      </div>

      <div>
        <p class="left-section-label">談話目標</p>
        <p class="left-section-text" id="display-goal">—</p>
      </div>

      <div class="left-spacer"></div>

      <button class="reset-link" id="reset-link" onclick="resetSession()" style="display:none">← 重新設定情境</button>
    </div>

    <!-- 右欄：對話區 -->
    <div class="right-panel">
      <div class="avatar-ring" id="avatar-ring">
        👤
        <div class="avatar-dot" id="avatar-dot"></div>
      </div>

      <p class="voice-status" id="voice-status">正在連線語音助理...</p>

      <button class="mic-btn" id="mic-btn" onclick="toggleMic()" style="display:none">
        <svg viewBox="0 0 24 24"><path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm0 2a2 2 0 0 0-2 2v6a2 2 0 0 0 4 0V5a2 2 0 0 0-2-2zm7 8a1 1 0 0 1 .993.883L20 12a8 8 0 0 1-7 7.938V22h2a1 1 0 0 1 0 2H9a1 1 0 0 1 0-2h2v-2.062A8 8 0 0 1 4 12a1 1 0 0 1 2 0 6 6 0 0 0 12 0 1 1 0 0 1 1-1z"/></svg>
      </button>
      <p class="mic-label" id="mic-label" style="display:none">點擊靜音/取消靜音</p>

      <button class="end-btn" id="end-btn" onclick="endSession()" style="display:none">結束練習</button>

      <!-- 隱藏的 audio 元素播放 AI 語音 -->
      <audio id="ai-audio" autoplay></audio>
    </div>

  </div>
</div>

<!-- LiveKit SDK -->
<script src="https://cdn.jsdelivr.net/npm/livekit-client@2.5.8/dist/livekit-client.umd.min.js"></script>

<script>
  // ============================================================
  // 請將下方 GAS_URL 替換成你的 GAS 部署網址
  // ============================================================
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbyKV0LvnhNcrYQgnegJZhdYcvJnXBYO1OXauEkKQaeJVpI3ke0jkFxcv-6c5cEj4Lsg/exec';

  let livekitRoom = null;
  let micMuted = false;

  function toggleChip(el) { el.classList.toggle('selected'); }

  function switchTab(n) {
    document.getElementById('tab1').classList.toggle('active', n === 1);
    document.getElementById('tab2').classList.toggle('active', n === 2);
    document.getElementById('screen1').classList.toggle('active', n === 1);
    document.getElementById('screen2').classList.toggle('active', n === 2);
  }

  async function startSession() {
    const name  = document.getElementById('emp-name').value.trim() || '職員';
    const years = document.getElementById('emp-years').value.trim();
    const role  = document.getElementById('emp-role').value.trim() || '職員';
    const bg    = document.getElementById('emp-bg').value.trim() || '（未填寫）';
    const selected = [...document.querySelectorAll('.chip.selected')].map(c => c.textContent).join('、');
    const extra = document.getElementById('emp-extra').value.trim();
    const goal  = [selected, extra].filter(Boolean).join('、') || '（未填寫）';

    document.getElementById('display-name').textContent = name;
    document.getElementById('display-meta').textContent = role + (years ? '・' + years : '');
    document.getElementById('display-bg').textContent   = bg;
    document.getElementById('display-goal').textContent = goal;

    const btn = document.getElementById('start-btn');
    btn.disabled = true;
    btn.textContent = '連線中...';

    switchTab(2);
    setStatus('正在取得語音連線...', '');

    try {
      const res  = await fetch(GAS_URL + '?action=getVoiceToken', { redirect: 'follow' });
      const json = await res.json();

      if (json.error) {
        setStatus('連線失敗：' + json.error, 'error');
        showResetOnly();
        return;
      }

      const { livekitUrl, accessToken } = json.data;

      if (!livekitUrl || !accessToken) {
        setStatus('無法取得語音 token，請稍後再試', 'error');
        showResetOnly();
        return;
      }

      await connectLiveKit(livekitUrl, accessToken);

    } catch (err) {
      setStatus('連線失敗：' + err.message, 'error');
      showResetOnly();
    } finally {
      btn.disabled = false;
      btn.textContent = '開始練習 →';
    }
  }

  async function connectLiveKit(url, token) {
    setStatus('正在連接語音房間...', '');

    try {
      const LivekitClient = window.LivekitClient;
      livekitRoom = new LivekitClient.Room({
        audioCaptureDefaults: { echoCancellation: true, noiseSuppression: true }
      });

      // 監聽 AI 說話的音訊
      livekitRoom.on(LivekitClient.RoomEvent.TrackSubscribed, (track, pub, participant) => {
        if (track.kind === LivekitClient.Track.Kind.Audio) {
          const audioEl = document.getElementById('ai-audio');
          track.attach(audioEl);
          setAISpeaking(true);
        }
      });

      livekitRoom.on(LivekitClient.RoomEvent.TrackUnsubscribed, (track) => {
        track.detach();
        setAISpeaking(false);
      });

      livekitRoom.on(LivekitClient.RoomEvent.Disconnected, () => {
        setStatus('對話已結束', '');
        setAISpeaking(false);
        showResetOnly();
      });

      livekitRoom.on(LivekitClient.RoomEvent.Connected, () => {
        setStatus('已連線，AI 正在準備開場白...', 'active');
        document.getElementById('avatar-dot').classList.add('connected');
        document.getElementById('mic-btn').style.display = 'flex';
        document.getElementById('mic-label').style.display = 'block';
        document.getElementById('end-btn').style.display = 'block';
      });

      // 連接並啟用麥克風
      await livekitRoom.connect(url, token);
      await livekitRoom.localParticipant.enableCameraAndMicrophone();
      await livekitRoom.localParticipant.setMicrophoneEnabled(true);

    } catch (err) {
      setStatus('語音連接失敗：' + err.message, 'error');
      showResetOnly();
    }
  }

  function toggleMic() {
    if (!livekitRoom) return;
    micMuted = !micMuted;
    livekitRoom.localParticipant.setMicrophoneEnabled(!micMuted);
    const btn = document.getElementById('mic-btn');
    btn.classList.toggle('muted', micMuted);
    document.getElementById('mic-label').textContent = micMuted ? '麥克風已靜音（點擊開啟）' : '點擊靜音/取消靜音';
  }

  async function endSession() {
    if (livekitRoom) {
      await livekitRoom.disconnect();
      livekitRoom = null;
    }
    setStatus('練習已結束', '');
    setAISpeaking(false);
    document.getElementById('avatar-dot').classList.remove('connected');
    document.getElementById('mic-btn').style.display = 'none';
    document.getElementById('mic-label').style.display = 'none';
    document.getElementById('end-btn').style.display = 'none';
    showResetOnly();
  }

  async function resetSession() {
    await endSession();
    setTimeout(() => switchTab(1), 300);
    document.getElementById('reset-link').style.display = 'none';
  }

  function setStatus(msg, type) {
    const el = document.getElementById('voice-status');
    el.textContent = msg;
    el.className = 'voice-status' + (type ? ' ' + type : '');
  }

  function setAISpeaking(speaking) {
    document.getElementById('avatar-ring').classList.toggle('speaking', speaking);
  }

  function showResetOnly() {
    document.getElementById('reset-link').style.display = 'block';
  }
</script>
</body>
</html>
